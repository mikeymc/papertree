# ABOUTME: GitHub Actions workflow to trigger scheduled background jobs
# ABOUTME: Runs nightly screening and caching jobs via the job API

name: Scheduled Jobs

on:
  schedule:
    # Alerts check - every hour at :03
    - cron: '3 * * * *'
    # Price Update - 4am ET to 8pm ET on weekdays
    - cron: '*/5 9-23 * * 1-5' # 4am - 6:55pm ET Mon-Fri
    - cron: '*/5 0 * * 2-6'    # 7pm - 7:55pm ET Mon-Fri (12am-1am UTC Tue-Sat)
    # Full screening at 8:00 PM ET S-Th (1:00 AM UTC M-F)
    - cron: '0 1 * * 1-5'
    # News cache every 2 hours from 6am-8pm ET on weekdays
    - cron: '2 11 * * 1-5'  # 6:02am ET
    - cron: '2 13 * * 1-5'  # 8:02am ET
    - cron: '2 15 * * 1-5'  # 10:02am ET
    - cron: '2 17 * * 1-5'  # 12:02pm ET
    - cron: '2 19 * * 1-5'  # 2:02pm ET
    - cron: '2 21 * * 1-5'  # 4:02pm ET
    - cron: '2 23 * * 1-5'  # 6:02pm ET
    - cron: '2 1 * * 2-6'   # 8:02pm ET (1:02am UTC next day = Tue-Sat)
    # 8-K cache every 2 hours from 6am-8pm ET on weekdays (with RSS filtering)
    - cron: '12 11 * * 1-5'  # 6:12am ET
    - cron: '12 13 * * 1-5'  # 8:12am ET
    - cron: '12 15 * * 1-5'  # 10:12am ET
    - cron: '12 17 * * 1-5'  # 12:12pm ET
    - cron: '12 19 * * 1-5'  # 2:12pm ET
    - cron: '12 21 * * 1-5'  # 4:12pm ET
    - cron: '12 23 * * 1-5'  # 6:12pm ET
    - cron: '12 1 * * 2-6'   # 8:12pm ET (1:12am UTC next day = Tue-Sat)
    # 10K cache - every 2 hours (:22) to interleave with 8-K
    - cron: '22 11 * * 1-5'  # 6:22am ET
    - cron: '22 13 * * 1-5'  # 8:22am ET
    - cron: '22 15 * * 1-5'  # 10:22am ET
    - cron: '22 17 * * 1-5'  # 12:22pm ET
    - cron: '22 19 * * 1-5'  # 2:22pm ET
    - cron: '22 21 * * 1-5'  # 4:22pm ET
    - cron: '22 23 * * 1-5'  # 6:22pm ET
    - cron: '22 1 * * 2-6'   # 8:22pm ET
    # Form 4 cache - every 2 hours (:32) to interleave with 8-K
    - cron: '32 11 * * 1-5'  # 6:32am ET
    - cron: '32 13 * * 1-5'  # 8:32am ET
    - cron: '32 15 * * 1-5'  # 10:32am ET
    - cron: '32 17 * * 1-5'  # 12:32pm ET
    - cron: '32 19 * * 1-5'  # 2:32pm ET
    - cron: '32 21 * * 1-5'  # 4:32pm ET
    - cron: '32 23 * * 1-5'  # 6:32pm ET
    - cron: '32 1 * * 2-6'   # 8:32pm ET
    # Price history cache at 11:00 PM ET S-Th (4:00 AM UTC M-F)
    - cron: '0 4 * * 1-5'
    # Outlook cache at 12:00 AM ET weekdays (5:00 AM UTC M-F)
    - cron: '0 5 * * 1-5'
    # Transcript cache - runs 4x weekdays
    - cron: '36 5 * * 1-5'  # 12:36 AM ET
    - cron: '36 11 * * 1-5' # 6:36 AM ET
    - cron: '36 17 * * 1-5' # 12:36 PM ET 
    - cron: '36 23 * * 1-5' # 6:36 PM ET

    # Forward metrics cache at 2:00 AM ET weekdays (7:00 AM UTC M-F)
    - cron: '0 7 * * 1-5'
    # Thesis refresh at 3:00 AM ET (8:00 AM UTC) on weekdays - before market open
    - cron: '0 8 * * 1-5'
    # Strategy execution at 9:31 AM ET (2:31 PM UTC) on weekdays - just after market open
    - cron: '31 14 * * 1-5'
    # Benchmark snapshot at 4:06 PM ET (9:06 PM UTC) on weekdays - Market Close
    - cron: '6 21 * * 1-5'
    # Portfolio sweep (dividends, snapshots, benchmark) at 9:00 PM ET weekdays (2:00 AM UTC Tue-Sat)
    - cron: '0 2 * * 2-6'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job type to run'
        required: true
        default: 'full_screening'
        type: choice
        options:
          - check_alerts
          - full_screening
          - price_history_cache
          - news_cache
          - 10k_cache
          - 8k_cache
          - form4_cache
          - outlook_cache
          - transcript_cache
          - forward_metrics_cache
          - price_update
          - strategy_execution
          - benchmark_snapshot
          - historical_fundamentals_cache
          - quarterly_fundamentals_cache
          - thesis_refresher
          - portfolio_sweep

jobs:
  trigger-job:
    runs-on: ubuntu-latest
    steps:
      - name: Determine job type
        id: job-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.job_type }}" >> $GITHUB_OUTPUT
          else
            # Match on the ACTUAL cron expression that triggered this run
            # This is reliable even if the job is delayed by hours
            SCHEDULE="${{ github.event.schedule }}"

            case "$SCHEDULE" in
              "*/5 9-23 * * 1-5") echo "type=price_update" >> $GITHUB_OUTPUT ;;
              "*/5 0 * * 2-6")   echo "type=price_update" >> $GITHUB_OUTPUT ;;
              "3 * * * *")   echo "type=check_alerts" >> $GITHUB_OUTPUT ;;
              "0 1 * * 1-5")   echo "type=full_screening" >> $GITHUB_OUTPUT ;;
              "2 11 * * 1-5") echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "2 13 * * 1-5") echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "2 15 * * 1-5") echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "2 17 * * 1-5") echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "2 19 * * 1-5") echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "2 21 * * 1-5") echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "2 23 * * 1-5") echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "2 1 * * 2-6")  echo "type=news_cache" >> $GITHUB_OUTPUT ;;
              "12 11 * * 1-5") echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "12 13 * * 1-5") echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "12 15 * * 1-5") echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "12 17 * * 1-5") echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "12 19 * * 1-5") echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "12 21 * * 1-5") echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "12 23 * * 1-5") echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "12 1 * * 2-6")  echo "type=8k_cache" >> $GITHUB_OUTPUT ;;
              "22 11 * * 1-5") echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "22 13 * * 1-5") echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "22 15 * * 1-5") echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "22 17 * * 1-5") echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "22 19 * * 1-5") echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "22 21 * * 1-5") echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "22 23 * * 1-5") echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "22 1 * * 2-6")  echo "type=10k_cache" >> $GITHUB_OUTPUT ;;
              "32 11 * * 1-5") echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "32 13 * * 1-5") echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "32 15 * * 1-5") echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "32 17 * * 1-5") echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "32 19 * * 1-5") echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "32 21 * * 1-5") echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "32 23 * * 1-5") echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "32 1 * * 2-6")  echo "type=form4_cache" >> $GITHUB_OUTPUT ;;
              "0 4 * * 1-5")   echo "type=price_history_cache" >> $GITHUB_OUTPUT ;;
              "0 5 * * 1-5")   echo "type=outlook_cache" >> $GITHUB_OUTPUT ;;
              "36 5 * * 1-5")  echo "type=transcript_cache" >> $GITHUB_OUTPUT ;;
              "36 11 * * 1-5") echo "type=transcript_cache" >> $GITHUB_OUTPUT ;;
              "36 17 * * 1-5") echo "type=transcript_cache" >> $GITHUB_OUTPUT ;;
              "36 23 * * 1-5") echo "type=transcript_cache" >> $GITHUB_OUTPUT ;;
              "0 7 * * 1-5")   echo "type=forward_metrics_cache" >> $GITHUB_OUTPUT ;;
              "0 8 * * 1-5") echo "type=thesis_refresher" >> $GITHUB_OUTPUT ;;
              "31 14 * * 1-5") echo "type=strategy_execution" >> $GITHUB_OUTPUT ;;
              "6 21 * * 1-5") echo "type=benchmark_snapshot" >> $GITHUB_OUTPUT ;;
              "0 2 * * 2-6")   echo "type=portfolio_sweep" >> $GITHUB_OUTPUT ;;
              *)             echo "Unknown schedule: $SCHEDULE" && exit 1 ;;
            esac
          fi

      - name: Trigger background job
        run: |
          JOB_TYPE="${{ steps.job-type.outputs.type }}"
          echo "Triggering job: $JOB_TYPE"

          # Set params based on job type (all default to US region)
          if [ "$JOB_TYPE" = "outlook_cache" ]; then
            PARAMS='{"region": "us"}'
          elif [ "$JOB_TYPE" = "form4_cache" ]; then
            PARAMS='{"region": "us", "use_rss": true}'
          elif [ "$JOB_TYPE" = "8k_cache" ]; then
            PARAMS='{"use_rss": true}'
          elif [ "$JOB_TYPE" = "10k_cache" ]; then
            PARAMS='{"use_rss": true}'
          elif [ "$JOB_TYPE" = "price_update" ]; then
             # Default to US for speed, can be expanded if needed
             PARAMS='{"regions": ["us"]}'
          elif [ "$JOB_TYPE" = "full_screening" ]; then
            PARAMS='{}'
          elif [ "$JOB_TYPE" = "strategy_execution" ]; then
            # Run all enabled strategies
            PARAMS='{}'
          elif [ "$JOB_TYPE" = "thesis_refresher" ]; then
            # Run all pending items
            PARAMS='{}'
          elif [ "$JOB_TYPE" = "portfolio_sweep" ]; then
            PARAMS='{}'
          else
            PARAMS='{}'
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.API_URL }}/api/jobs" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            -d "{\"type\": \"$JOB_TYPE\", \"params\": $PARAMS}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed to trigger job"
            exit 1
          fi

          JOB_ID=$(echo "$BODY" | jq -r '.job_id')
          echo "Job ID: $JOB_ID"
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

      - name: Monitor job (optional)
        if: success()
        run: |
          echo "Job triggered successfully. Monitor at:"
          echo "${{ secrets.API_URL }}/api/jobs/${{ steps.job-type.outputs.job_id }}"
